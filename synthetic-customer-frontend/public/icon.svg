<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5" />
      <stop offset="50%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#06B6D4" />
    </linearGradient>
    
    <!-- Glow Filter for premium look -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Base -->
  <rect width="180" height="180" rx="44" fill="url(#bgGrad)" />
  
  <!-- Subtle decorative grid or accent lines inside the background -->
  <rect x="8" y="8" width="164" height="164" rx="36" stroke="white" stroke-opacity="0.15" stroke-width="1.5" fill="none" />

  <!-- Overlapping User Personas and AI Spark -->
  <g transform="translate(10, 5)">
    <!-- Back/Secondary Persona Profile -->
    <g opacity="0.65" transform="scale(0.85) translate(28, 45)">
      <!-- Head -->
      <circle cx="65" cy="50" r="22" fill="white" />
      <!-- Shoulders -->
      <path d="M25 102 C25 82, 43 76, 65 76 C87 76, 105 82, 105 102 C105 107, 105 110, 105 110 L25 110 Z" fill="white" />
    </g>
    
    <!-- Front/Primary Persona Profile -->
    <g transform="translate(25, 45)">
      <!-- Head -->
      <circle cx="65" cy="50" r="22" fill="#FFFFFF" />
      <!-- Shoulders -->
      <path d="M25 102 C25 82, 43 76, 65 76 C87 76, 105 82, 105 102 C105 107, 105 110, 105 110 L25 110 Z" fill="#FFFFFF" />
    </g>
    
    <!-- AI Sparkle / Star Symbol (indicating Synthetic nature) -->
    <path d="M125 45 C125 53.284 118.284 60 110 60 C118.284 60 125 66.716 125 75 C125 66.716 131.716 60 140 60 C131.716 60 125 53.284 125 45 Z" fill="#FDE047" filter="url(#glow)" />
    
    <!-- Smaller companion star -->
    <path d="M42 32 C42 35.866 38.866 39 35 39 C38.866 39 42 42.134 42 46 C42 42.134 45.134 39 49 39 C45.134 39 42 35.866 42 32 Z" fill="#FFFFFF" opacity="0.9" />
  </g>
</svg>